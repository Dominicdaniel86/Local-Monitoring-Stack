global:
  scrape_interval: 10s # Pull metrics every 10 seconds
  evaluation_interval: 10s # Evaluate rules every 10 seconds

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  
  - job_name: 'flask_app'
    static_configs:
      - targets: ['flask_app:5000'] # Assuming Flask app exposes metrics on
    metrics_path: /metrics

  # Scrape cAdvisor for container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080'] # Assuming cAdvisor is running and exposing metrics on port 8080